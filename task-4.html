<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 4</title>
  <link rel="stylesheet" href="./css/common.css" />
  <style>
    body {
      font-family: "Montserrat", sans-serif;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    form label {
      font-weight: 400;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0.04em;
      color: #2e2f42;
      display: flex;
      flex-direction: column;
    }

    input {
      border: 1px solid #808080;
      border-radius: 4px;
      width: 360px;
      height: 40px;
      margin-bottom: 8px;
      font-weight: 400;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0.04em;
      color: #2e2f42;
    }

    button {
      background: #4e75ff;
      border-radius: 8px;
      padding: 8px 16px;
      width: 86px;
      height: 40px;
      border: none;
      font-weight: 500;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0.04em;
      color: #fff;
      margin-top: 16px;
      cursor: pointer;
      transition: .5s;
    }

    button:hover {
      border: 1px solid #000;
    }
  </style>
</head>

<body>
  <p><a href="./index.html">Go back</a></p>

  <form class="login-form">
    <label>
      Email
      <input type="email" name="email" />
    </label>
    <label>
      Password
      <input type="password" name="password" />
    </label>
    <button type="submit">Login</button>
  </form>

  <script src="./js/task-4.js" type="module"></script>
</body>

</html>
