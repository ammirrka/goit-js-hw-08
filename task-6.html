<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 6</title>
  <link rel="stylesheet" href="./css/common.css" />
  <style>
    body {
      font-family: "Montserrat", sans-serif;
    }

    #controls {
      padding: 32px;
      background: #f6f6fe;
      display: flex;
      gap: 16px;
    }

    input {
      border: 1px solid #808080;
      border-radius: 8px;
      width: 150px;
      height: 40px;
      font-weight: 400;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0.04em;
      color: #2e2f42;
      text-align: center;
      display: inline-block;
    }

    button {
      cursor: pointer;
      transition: .5s;
    }

    button:hover {
      border: 1px solid #000;
    }

    .first-button {
      border-radius: 8px;
      padding: 8px 16px;
      width: 120px;
      height: 40px;
      background: #4e75ff;
      font-weight: 500;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0.04em;
      color: #fff;
      border: none;
    }

    .second-button {
      border-radius: 8px;
      padding: 8px 16px;
      width: 120px;
      height: 40px;
      background: #ff4e4e;
      font-weight: 500;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0.04em;
      color: #fff;
      border: none;
    }

    #boxes {
      display: flex;
      padding: 32px 0 72px 0;
      gap: 44px;
      background: #f6f6fe;
      margin-top: 16px;
      padding-left: 32px;
    }
  </style>
</head>

<body>
  <p><a href="./index.html">Go back</a></p>

  <div id="controls">
    <input type="number" min="1" max="100" step="1" />
    <button class="first-button" type="button" data-create>Create</button>
    <button class="second-button" type="button" data-destroy>Destroy</button>
  </div>

  <div id="boxes"></div>

  <script src="./js/task-6.js" type="module"></script>
</body>

</html>
